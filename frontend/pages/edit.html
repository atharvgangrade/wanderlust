    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Listing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🌍 Wanderlust</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">All Listings</a>
                <a class="nav-link d-none" href="#" id="logoutBtn">Logout</a>
                <span class="nav-link text-light d-none" id="username"></span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6 mx-auto">
                <h2>Edit Listing</h2>
                <form id="editListingForm">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" 
                               id="title" 
                               class="form-control" 
                               required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea id="description" 
                                  class="form-control" 
                                  rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Image</label>
                        <input type="file" 
                               id="image" 
                               class="form-control" 
                               accept="image/*">
                        <img id="currentImage" 
                             class="mt-2 img-fluid rounded" 
                             style="max-height: 200px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Price per night (₹)</label>
                        <input type="number" 
                               id="price" 
                               class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" 
                               id="location" 
                               class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Country</label>
                        <input type="text" 
                               id="country" 
                               class="form-control">
                    </div>
                    <button type="submit" 
                            class="btn btn-warning w-100">
                        Update Listing
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/edit.js"></script>
</body>
</html>
