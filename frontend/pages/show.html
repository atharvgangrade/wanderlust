<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🌍 Wanderlust</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">All Listings</a>
                <a class="nav-link" href="login.html" id="loginBtn">Login</a>
                <a class="nav-link d-none" href="#" id="logoutBtn">Logout</a>
                <span class="nav-link text-light d-none" id="username"></span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Listing Details -->
        <div id="listingContainer">
            <div class="text-center">
                <div class="spinner-border" role="status"></div>
            </div>
        </div>

        <!-- Reviews Section -->
        <div class="mt-4" id="reviewsSection">
            <h3>Reviews</h3>

            <!-- Add Review Form -->
            <div id="addReviewForm" class="d-none">
                <div class="card mb-3">
                    <div class="card-body">
                        <h5>Add Your Review</h5>
                        <div class="mb-3">
                            <label>Rating</label>
                            <select id="rating" class="form-select">
                                <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                                <option value="4">⭐⭐⭐⭐ (4)</option>
                                <option value="3">⭐⭐⭐ (3)</option>
                                <option value="2">⭐⭐ (2)</option>
                                <option value="1">⭐ (1)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Comment</label>
                            <textarea id="comment" 
                                      class="form-control" 
                                      rows="3"
                                      placeholder="Write your review..."></textarea>
                        </div>
                        <button onclick="addReview()" 
                                class="btn btn-dark">
                            Submit Review
                        </button>
                    </div>
                </div>
            </div>

            <!-- Reviews List -->
            <div id="reviewsList"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/show.js"></script>
</body>
</html>
