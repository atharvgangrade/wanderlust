<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderlust</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🌍 Wanderlust</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="new.html" id="newListingBtn">New Listing</a>
                <a class="nav-link" href="login.html" id="loginBtn">Login</a>
                <a class="nav-link" href="signup.html" id="signupBtn">Signup</a>
                <a class="nav-link d-none" href="#" id="logoutBtn">Logout</a>
                <span class="nav-link text-light d-none" id="username"></span>
            </div>
        </div>
    </nav>

    <!-- Search Bar -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="input-group">
                    <input type="text" id="searchInput" 
                           class="form-control" 
                           placeholder="Search listings...">
                    <button class="btn btn-dark" onclick="searchListings()">
                        Search
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Listings Grid -->
    <div class="container mt-4">
        <h2>All Listings</h2>
        <div class="row" id="listingsContainer">
            <div class="text-center">
                <div class="spinner-border" role="status"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/listings.js"></script>
</body>
</html>
